title: "Eslam Mohamed"
description: "Research & Teaching Assistant · Embedded Linux Engineer · MSc CS Researcher"
author: "Eslam Mohamed"
email: ""
baseurl: ""
url: "https://eslammohamed.github.io"
github_username: t-eslammohamed

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md

# Collections
collections:
  posts:
    output: true

# Pagination
paginate: 6
paginate_path: "/blog/page:num/"

# Kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
