<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

  <!-- Noise overlay -->
  <div class="noise-overlay"></div>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="{{ '/' | relative_url }}" class="nav-logo">
        <span class="logo-bracket">&lt;</span>
        <span class="logo-name">eslam</span>
        <span class="logo-bracket">/&gt;</span>
      </a>

      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">home</a>
        <a href="{{ '/about' | relative_url }}" class="nav-link {% if page.url contains 'about' %}active{% endif %}">about</a>
        <a href="{{ '/research' | relative_url }}" class="nav-link {% if page.url contains 'research' %}active{% endif %}">research</a>
        <a href="{{ '/blog' | relative_url }}" class="nav-link {% if page.url contains 'blog' %}active{% endif %}">blog</a>
        <a href="{{ '/contact' | relative_url }}" class="nav-cta">contact</a>
      </div>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="nav-mobile" id="navMobile">
      <a href="{{ '/' | relative_url }}" class="nav-link">home</a>
      <a href="{{ '/about' | relative_url }}" class="nav-link">about</a>
      <a href="{{ '/research' | relative_url }}" class="nav-link">research</a>
      <a href="{{ '/blog' | relative_url }}" class="nav-link">blog</a>
      <a href="{{ '/contact' | relative_url }}" class="nav-link">contact</a>
    </div>
  </nav>

  <!-- Page Content -->
  <main>
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-left">
        <span class="footer-logo"><span class="accent">&lt;</span>eslam<span class="accent">/&gt;</span></span>
        <p>Research & Teaching Assistant · Embedded Linux Engineer</p>
        <p class="footer-location"><i class="fas fa-map-marker-alt"></i> Cairo, Egypt · Zewail City</p>
      </div>
      <div class="footer-links">
        <div class="footer-col">
          <h4>Navigate</h4>
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about' | relative_url }}">About</a>
          <a href="{{ '/research' | relative_url }}">Research</a>
          <a href="{{ '/blog' | relative_url }}">Blog</a>
        </div>
        <div class="footer-col">
          <h4>Connect</h4>
          <a href="https://github.com/t-eslammohamed" target="_blank"><i class="fab fa-github"></i> GitHub</a>
          <a href="https://linkedin.com/in/eslammohamed" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2025 Eslam Mohamed · Built with Jekyll & ❤️</span>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
